<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meus chamados – Sistema de Chamados</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="chamados">

  <!-- ========================================================
       LISTAGEM DE CHAMADOS
       ======================================================== -->
  <div class="card-main card-wide">

    <!-- Cabeçalho com título + botão + ações de nav -->
    <div class="list-header">
      <div>
        <h1 class="screen-title mb-0">Meus chamados</h1>
        <p class="screen-subtitle mb-0">Lista dos chamados que você registrou</p>
      </div>
      <button id="btnNovo" class="btn-novo">+ Novo</button>
    </div>

    <!-- Lista dinâmica (preenchida pelo JS) -->
    <div id="listaChamados">
      <p style="color:var(--text-muted); font-size:.9rem;">Carregando…</p>
    </div>

    <!-- Rodapé de navegação -->
    <div style="display:flex; gap:12px; margin-top:24px; justify-content:space-between;">
      <button id="btnVoltar" class="btn-outline-custom mb-0" style="max-width:200px;">← Voltar ao painel</button>
      <button onclick="fazerLogout()" class="btn-sm-outline">Sair</button>
    </div>

  </div><!-- /card-main -->

  <!-- ========================================================
       MODAL: Abrir / Editar chamado
       ======================================================== -->
  <div id="modalChamado" class="modal-overlay">
    <div class="modal-box">

      <h2 class="screen-title" id="modalChamadoTitulo" style="font-size:1.4rem; margin-bottom:4px;">
        Abrir chamado
      </h2>
      <p class="screen-subtitle">Preencha os dados para registrar um novo chamado</p>

      <div id="alertChamado" class="alert-box"></div>

      <form id="formChamado" novalidate>

        <!-- Título -->
        <div class="mb-3">
          <label for="chTitulo" class="form-label">Título</label>
          <input
            type="text"
            id="chTitulo"
            class="form-control"
            placeholder="Resumo do problema"
            required
          />
        </div>

        <!-- Descrição -->
        <div class="mb-3">
          <label for="chDescricao" class="form-label">Descrição</label>
          <textarea
            id="chDescricao"
            class="form-control"
            placeholder="Descreva o chamado em detalhes…"
            rows="4"
            required
          ></textarea>
        </div>

        <!-- Departamento + Região lado a lado -->
        <div class="col-2 mb-3">
          <div>
            <label for="chDepartamento" class="form-label">Departamento</label>
            <select id="chDepartamento" class="form-select" required>
              <option value="">Selecione…</option>
              <option value="TI">TI</option>
              <option value="RH">RH</option>
              <option value="Financeiro">Financeiro</option>
            </select>
          </div>
          <div>
            <label for="chRegiao" class="form-label">Região</label>
            <select id="chRegiao" class="form-select" required>
              <option value="">Selecione…</option>
              <option value="Sudeste">Sudeste</option>
              <option value="Sul">Sul</option>
              <option value="Norte">Norte</option>
            </select>
          </div>
        </div>

        <!-- Responsável -->
        <div class="mb-3">
          <label for="chResponsavel" class="form-label">Responsável</label>
          <input
            type="text"
            id="chResponsavel"
            class="form-control"
            placeholder="Nome do responsável pelo atendimento"
            required
          />
        </div>

        <!-- Status (visível apenas na edição) -->
        <div id="statusGroup" class="mb-4" style="display:none;">
          <label for="chStatus" class="form-label">Status</label>
          <select id="chStatus" class="form-select">
            <option value="Em aberto">Em aberto</option>
            <option value="Em análise">Em análise</option>
            <option value="Resolvido">Resolvido</option>
          </select>
        </div>

        <!-- Hint para novo chamado -->
        <p class="status-hint mb-4" id="statusHint">
          Ao criar um novo chamado, o status inicial será "Em aberto".
        </p>

        <!-- Botões -->
        <div class="col-2">
          <button type="button" onclick="fecharModalChamado()" class="btn-outline-custom mb-0">Cancelar</button>
          <button type="submit" id="btnSalvarChamado" class="btn-primary-custom mb-0">Cadastrar chamado</button>
        </div>

      </form>
    </div>
  </div><!-- /modalChamado -->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>

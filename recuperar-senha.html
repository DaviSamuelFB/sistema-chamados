<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recuperar Senha – Sistema de Chamados</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="recuperar-senha">

  <!-- ========================================================
       TELA DE RECUPERAÇÃO DE SENHA
       ======================================================== -->
  <div class="card-main">

    <div class="screen-icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.8" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25z" />
      </svg>
    </div>

    <h1 class="screen-title centered">Recuperar Senha</h1>
    <p class="screen-subtitle centered">Informe seu e-mail e enviaremos as instruções para redefinir sua senha.</p>

    <!-- Alerta de erro/sucesso -->
    <div id="alertRecuperar" class="alert-box"></div>

    <!-- Formulário -->
    <form id="formRecuperar" novalidate>

      <div class="mb-4">
        <label for="email" class="form-label">E-mail</label>
        <input
          type="email"
          id="email"
          class="form-control"
          placeholder="nome@exemplo.com"
          autocomplete="email"
          required
        />
      </div>

      <button type="submit" class="btn-primary-custom">Enviar instruções</button>

    </form>

    <p class="form-footer">
      Lembrou sua senha? <a href="login.html" class="link-accent">Voltar ao login</a>
    </p>

  </div><!-- /card-main -->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
  <script>
    document.getElementById('formRecuperar').addEventListener('submit', function (e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const alerta = document.getElementById('alertRecuperar');

      if (!email) {
        alerta.className = 'alert-box alert-erro show';
        alerta.textContent = 'Por favor, informe seu e-mail.';
        return;
      }

      alerta.className = 'alert-box alert-ok show';
      alerta.textContent = 'Se esse e-mail estiver cadastrado, você receberá as instruções em breve.';
      this.reset();
    });
  </script>
</body>
</html>

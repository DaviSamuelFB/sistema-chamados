<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrar – Sistema de Chamados</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body data-page="login">

  <!-- ========================================================
       TELA DE LOGIN
       ======================================================== -->
  <div class="card-main">

    <h1 class="screen-title">Entrar</h1>
    <p class="screen-subtitle">Acesse sua conta com seu e-mail e senha.</p>

    <!-- Alerta de erro/sucesso -->
    <div id="alertLogin" class="alert-box"></div>

    <!-- Formulário -->
    <form id="formLogin" novalidate>

      <div class="mb-3">
        <label for="email" class="form-label">E-mail</label>
        <input
          type="email"
          id="email"
          class="form-control"
          placeholder="nome@exemplo.com"
          autocomplete="email"
          required
        />
      </div>

      <div class="mb-4">
        <label for="senha" class="form-label">Senha</label>
        <div class="password-wrapper">
          <input
            type="password"
            id="senha"
            class="form-control"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />
          <button type="button" class="btn-toggle-pwd" aria-label="Mostrar senha" onclick="toggleSenha('senha', this)">
            <svg class="icon-eye" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 16 16" fill="currentColor">
              <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8zM1.173 8a13.133 13.133 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5c2.12 0 3.879 1.168 5.168 2.457A13.133 13.133 0 0 1 14.828 8c-.058.087-.122.183-.195.288-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5c-2.12 0-3.879-1.168-5.168-2.457A13.134 13.134 0 0 1 1.172 8z"/>
              <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5zM4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0z"/>
            </svg>
            <svg class="icon-eye-slash" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 16 16" fill="currentColor" style="display:none">
              <path d="M13.359 11.238C15.06 9.72 16 8 16 8s-3-5.5-8-5.5a7.028 7.028 0 0 0-2.79.588l.77.771A5.944 5.944 0 0 1 8 3.5c2.12 0 3.879 1.168 5.168 2.457A13.134 13.134 0 0 1 14.828 8c-.058.087-.122.183-.195.288-.335.48-.83 1.12-1.465 1.755-.165.165-.337.328-.517.486l.708.709z"/>
              <path d="M11.297 9.176a3.5 3.5 0 0 0-4.474-4.474l.823.823a2.5 2.5 0 0 1 2.829 2.829l.822.822zm-2.943 1.299.822.822a3.5 3.5 0 0 1-4.474-4.474l.823.823a2.5 2.5 0 0 0 2.829 2.829z"/>
              <path d="M3.35 5.47c-.18.16-.353.322-.518.487A13.134 13.134 0 0 0 1.172 8l.195.288c.335.48.83 1.12 1.465 1.755C4.121 11.332 5.881 12.5 8 12.5c.716 0 1.39-.133 2.02-.36l.77.772A7.029 7.029 0 0 1 8 13.5C3 13.5 0 8 0 8s.939-1.721 2.641-3.238l.708.709zm10.296 8.884-12-12 .708-.708 12 12-.708.708z"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="text-end mb-2">
        <a href="recuperar-senha.html" class="link-accent" style="font-size:0.85rem;">Esqueceu sua senha?</a>
      </div>

      <button type="submit" class="btn-primary-custom">Entrar</button>

    </form>

    <p class="form-footer">
      Não possui uma conta? <a href="cadastro.html" class="link-accent">Cadastre-se</a>
    </p>

  </div><!-- /card-main -->

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
  <script>
    function toggleSenha(id, btn) {
      const input = document.getElementById(id);
      const mostrar = input.type === 'password';
      input.type = mostrar ? 'text' : 'password';
      btn.setAttribute('aria-label', mostrar ? 'Ocultar senha' : 'Mostrar senha');
      btn.querySelector('.icon-eye').style.display = mostrar ? 'none' : '';
      btn.querySelector('.icon-eye-slash').style.display = mostrar ? '' : 'none';
    }
  </script>
</body>
</html>
